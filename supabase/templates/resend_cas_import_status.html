<!doctype html>
<html>
  <body style="margin:0;background:#FAFBFD;font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#0A1430;">
    <div style="display:none;max-height:0;overflow:hidden;opacity:0;">
      {{{TITLE}}}
    </div>
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#FAFBFD;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#FFFFFF;border:1px solid #DDE5EE;border-radius:18px;overflow:hidden;">
            <tr>
              <td style="background:#0A1430;padding:24px 28px;color:#FFFFFF;">
                <div style="font-size:24px;line-height:30px;font-weight:800;letter-spacing:0;">FolioLens</div>
                <div style="margin-top:4px;font-size:11px;line-height:16px;font-weight:700;letter-spacing:4px;color:#BAC6D8;">FOCUS. COMPARE. GROW.</div>
              </td>
            </tr>
            <tr>
              <td style="padding:28px;">
                <div style="display:inline-block;background:{{{STATUS_BG}}};color:{{{STATUS_TEXT_COLOR}}};border-radius:999px;padding:6px 12px;font-size:12px;line-height:16px;font-weight:800;text-transform:uppercase;letter-spacing:0.6px;">{{{STATUS_LABEL}}}</div>
                <h1 style="margin:18px 0 10px;font-size:28px;line-height:34px;font-weight:800;letter-spacing:0;color:#0A1430;">{{{TITLE}}}</h1>
                <p style="margin:0 0 22px;font-size:16px;line-height:24px;color:#263248;">{{{INTRO}}}</p>

                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border:1px solid #DDE5EE;border-radius:14px;background:#ECFDF5;margin-bottom:22px;">
                  <tr>
                    <td style="padding:16px 18px;border-right:1px solid #DDE5EE;">
                      <div style="font-size:12px;line-height:16px;font-weight:800;text-transform:uppercase;letter-spacing:0.6px;color:#7B8AA3;">Funds updated</div>
                      <div style="margin-top:6px;font-size:24px;line-height:30px;font-weight:800;color:#0A1430;">{{{FUNDS_UPDATED}}}</div>
                    </td>
                    <td style="padding:16px 18px;">
                      <div style="font-size:12px;line-height:16px;font-weight:800;text-transform:uppercase;letter-spacing:0.6px;color:#7B8AA3;">Transactions</div>
                      <div style="margin-top:6px;font-size:24px;line-height:30px;font-weight:800;color:#0A1430;">{{{TRANSACTIONS_IMPORTED}}}</div>
                    </td>
                  </tr>
                </table>

                <div style="border:1px solid #DDE5EE;border-radius:14px;background:#FFFFFF;padding:16px 18px;margin-bottom:22px;">
                  <div style="font-size:12px;line-height:16px;font-weight:800;text-transform:uppercase;letter-spacing:0.6px;color:#7B8AA3;">{{{DETAIL_LABEL}}}</div>
                  <p style="margin:8px 0 0;font-size:15px;line-height:23px;color:#263248;">{{{DETAIL_TEXT}}}</p>
                  <div style="margin-top:14px;font-size:12px;line-height:16px;font-weight:800;text-transform:uppercase;letter-spacing:0.6px;color:#7B8AA3;">{{{NEXT_STEP_LABEL}}}</div>
                  <p style="margin:8px 0 0;font-size:15px;line-height:23px;color:#263248;">{{{NEXT_STEP_TEXT}}}</p>
                </div>

                <a href="{{{APP_URL}}}" style="display:inline-block;background:#10B981;color:#FFFFFF;text-decoration:none;border-radius:999px;padding:12px 18px;font-size:15px;line-height:20px;font-weight:800;">{{{CTA_LABEL}}}</a>
              </td>
            </tr>
            <tr>
              <td style="padding:18px 28px;border-top:1px solid #DDE5EE;font-size:12px;line-height:18px;color:#7B8AA3;">
                {{{FOOTER_TEXT}}}
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
