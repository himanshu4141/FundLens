name: Sync AMFI Portfolio Data

# Monthly: runs on the 11th at 06:00 UTC — a few days after month-end
# disclosures are typically published (SEBI mandates within 10 days).
# Also dispatchable manually for testing or on-demand refresh.
on:
  schedule:
    - cron: '0 6 11 * *'
  workflow_dispatch:

jobs:
  sync:
    name: Fetch & upsert AMFI portfolio data
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run AMFI sync
        env:
          SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: node scripts/sync-amfi-portfolios.mjs
