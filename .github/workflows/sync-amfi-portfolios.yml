name: Sync AMFI Portfolio Data

# Monthly: runs on the 11th at 06:00 UTC — a few days after month-end
# disclosures are typically published (SEBI mandates within 10 days).
# Also dispatchable manually for testing or on-demand refresh.
#
# Runs against both DEV and PROD: the AMFI portfolio composition data is
# identical across environments, and keeping DEV current makes feature work
# realistic. The two jobs run in parallel and don't fail-fast — a problem in
# one environment doesn't block the other.
on:
  schedule:
    - cron: '0 6 11 * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to sync (default: both)'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - dev
          - prod

jobs:
  sync:
    name: Sync ${{ matrix.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.environment == 'both' ||
      github.event.inputs.environment == matrix.environment
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, prod]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run AMFI sync (${{ matrix.environment }})
        env:
          SUPABASE_URL: ${{ matrix.environment == 'prod' && secrets.EXPO_PUBLIC_SUPABASE_URL_PROD || secrets.EXPO_PUBLIC_SUPABASE_URL_DEV }}
          SUPABASE_SECRET_KEY: ${{ matrix.environment == 'prod' && secrets.SUPABASE_SECRET_KEY_PROD || secrets.SUPABASE_SECRET_KEY_DEV }}
        run: node scripts/sync-amfi-portfolios.mjs
