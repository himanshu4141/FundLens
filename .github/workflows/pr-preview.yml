name: PR Preview

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  checks:
    name: Typecheck, Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - name: Run tests
        run: npm test -- --coverage --ci

  eas-update:
    name: EAS Update (PR preview)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Publish EAS Update
        id: eas-update
        run: |
          UPDATE_JSON=$(python3 scripts/eas-update.py)
          echo "update_json<<EOF" >> "$GITHUB_OUTPUT"
          echo "$UPDATE_JSON" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL_DEV }}
          EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY_DEV }}
          EXPO_PUBLIC_APP_BASE_URL: ${{ secrets.EXPO_PUBLIC_APP_BASE_URL_DEV }}
          APP_VARIANT: preview-pr
          EAS_UPDATE_CHANNEL: pr-builds
          EAS_UPDATE_MESSAGE: PR #${{ github.event.number }}: ${{ github.event.pull_request.title }}
      - name: Trace OTA IDs + update PR comment
        uses: ./.github/actions/ota-trace
        with:
          update_json: ${{ steps.eas-update.outputs.update_json }}
          channel: pr-builds
          commit_sha: ${{ github.event.pull_request.head.sha }}
          pr_number: ${{ github.event.number }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repo: ${{ github.repository }}
