name: Main Deploy

on:
  push:
    branches:
      - main

jobs:
  checks:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - name: Run tests
        run: npm test -- --coverage --ci

  eas-update-main:
    name: EAS Update (dev stable)
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Publish EAS Update to foliolens-main
        id: eas-update
        run: |
          UPDATE_JSON=$(python3 scripts/eas-update.py)
          echo "update_json<<EOF" >> "$GITHUB_OUTPUT"
          echo "$UPDATE_JSON" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        env:
          APP_VARIANT: preview-main
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL_DEV }}
          EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY_DEV }}
          EXPO_PUBLIC_APP_BASE_URL: ${{ secrets.EXPO_PUBLIC_APP_BASE_URL_DEV }}
          EAS_UPDATE_CHANNEL: foliolens-main
          EAS_UPDATE_MESSAGE: "Main: ${{ github.sha }}"
      - name: Trace OTA update IDs
        uses: ./.github/actions/ota-trace
        with:
          update_json: ${{ steps.eas-update.outputs.update_json }}
          channel: foliolens-main
          commit_sha: ${{ github.sha }}
