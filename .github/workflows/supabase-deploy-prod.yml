name: Deploy Supabase (Prod)

# MANUAL ONLY — run from the GitHub Actions tab before or after tagging a release.
# Validates migrations against prod, deploys edge functions, and pushes migrations.
# Take a database backup before running this in production.

on:
  workflow_dispatch:

jobs:
  validate-migrations:
    name: Validate Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Patch config.toml (strip schedule keys for CLI compat)
        run: sed -i 's/^schedule = .*$/# schedule = (managed via pg_cron migration)/' supabase/config.toml

      - name: Start local Supabase stack
        run: supabase start

      - name: Reset local Supabase database from migrations
        run: supabase db reset

      - name: Lint local database schema
        run: supabase db lint --local --fail-on error --schema public

      - name: Link Supabase project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF_PROD }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify migration version parity
        run: python3 scripts/check_supabase_migration_parity.py
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # Note: a previous version of this job ran `supabase db diff --linked`
      # and grepped its output for any DDL keyword as a "drift detector".
      # That check is structurally the same direction-flipped form of the
      # parity script above and triggers a false positive every time the
      # deploy includes a new migration not yet on the remote (which is
      # the entire reason a deploy runs). The parity script catches the
      # only direction that's actually dangerous — out-of-band changes
      # added directly on the remote — so the diff step has been removed.

  deploy-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    needs: validate-migrations
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Patch config.toml (strip schedule keys for CLI compat)
        run: sed -i 's/^schedule = .*$/# schedule = (managed via pg_cron migration)/' supabase/config.toml

      - name: Deploy all Edge Functions
        run: supabase functions deploy --project-ref "${{ secrets.SUPABASE_PROJECT_REF_PROD }}" --no-verify-jwt --use-api
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  run-migrations:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: validate-migrations
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Patch config.toml (strip schedule keys for CLI compat)
        run: sed -i 's/^schedule = .*$/# schedule = (managed via pg_cron migration)/' supabase/config.toml

      # `supabase db push` has no --project-ref flag; link the project first so
      # the subsequent push uses the Management API (IPv4/HTTPS) rather than a
      # direct DB connection (now IPv6, unreachable from GitHub Actions runners).
      - name: Link Supabase project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF_PROD }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations
        run: supabase db push --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
