name: Deploy Supabase

# Triggered on pushes to main that touch edge functions or migrations.
# Requires secrets: SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF, SUPABASE_DB_URL

on:
  workflow_dispatch:  # allow manual runs from GitHub Actions tab
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - 'supabase/migrations/**'

jobs:
  deploy-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Supabase CLI ≤2.x doesn't parse the `schedule` key in [functions.*]
      # Strip it so the CLI can parse config.toml without errors
      - name: Patch config.toml (strip schedule keys for CLI compat)
        run: sed -i 's/^schedule = .*$/# schedule = (managed via pg_cron migration)/' supabase/config.toml

      - name: Deploy all Edge Functions
        run: supabase functions deploy --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}" --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  run-migrations:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations
        # Uses the Supabase Management API (--project-ref) instead of a direct
        # DB connection (--db-url). Direct connections now use IPv6 which GitHub
        # Actions runners don't support; the API endpoint is IPv4/HTTPS.
        run: supabase db push --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
