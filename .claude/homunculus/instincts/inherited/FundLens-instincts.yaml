# FundLens Workflow Feature Enhancement With Iterative Fixes

## Action

Follow the feature-enhancement-with-iterative-fixes workflow:
1. Step 1: Implement new feature or screen, including core logic and tests.
2. Step 2: Commit initial implementation (often touching a main screen file and utility/test files).
3. Step 3: Make a series of focused fix commits to the same main file(s), each addressing specific UX, logic, or UI issues.
4. Step 4: Each fix commit typically changes only the main screen file or closely related files.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: app/(tabs)/simulator.tsx, src/utils/simulatorCalc.ts, src/utils/__tests__/simulatorCalc.test.ts

