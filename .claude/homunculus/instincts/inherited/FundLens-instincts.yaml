# FundLens Workflow Implement Feature With Design Doc And Tests

## Action

Follow the implement-feature-with-design-doc-and-tests workflow:
1. Add a design or exec plan markdown file under docs/plans/phase-*/
2. Create or update implementation files (screen/component/utilities) under app/ and src/
3. Add or update unit tests in src/utils/__tests__/
4. Iteratively fix and enhance the feature with additional commits, often touching the same set of files

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: docs/plans/phase-*/, app/(tabs)/*.tsx, src/utils/*.ts

