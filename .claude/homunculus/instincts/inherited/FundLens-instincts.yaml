# FundLens Workflow Theme Support Extension

## Action

Follow the theme-support-extension workflow:
1. Refactor target screen/component to replace direct color imports with useTheme() hook
2. Update styles to be generated from theme context (e.g., convert StyleSheet.create to makeStyles factories)
3. Test to ensure the component updates correctly on theme change

